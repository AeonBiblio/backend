# Production (nginx): сервисы слушают только 127.0.0.1 на хосте.
# Локальная разработка без nginx: в .env задайте BIND_ADDRESS=0.0.0.0
#
# Запуск:
#   cd backend && docker compose up -d --build
# Или из корня репозитория:
#   docker compose up -d --build

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    env_file: .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_CORS_ALLOW_ORIGIN: ${CORS_ORIGINS}
      MINIO_SERVER_URL: ${MINIO_PUBLIC_URL:-}
    volumes:
      - minio_data:/data
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:9000:9000"
      - "${BIND_ADDRESS:-127.0.0.1}:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_CORS_ORIGINS_JSON: ${MINIO_CORS_ORIGINS_JSON:-["http://localhost:3000","http://localhost:5173"]}
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
        mc mb --ignore-existing local/$$MINIO_BUCKET &&
        printf '%s' \"{\\\"AllowedOrigins\\\":$$MINIO_CORS_ORIGINS_JSON,\\\"AllowedMethods\\\":[\\\"GET\\\",\\\"PUT\\\",\\\"POST\\\",\\\"DELETE\\\",\\\"HEAD\\\"],\\\"AllowedHeaders\\\":[\\\"*\\\"],\\\"ExposeHeaders\\\":[\\\"ETag\\\"]}\" > /tmp/cors.json &&
        mc cors set local/$$MINIO_BUCKET /tmp/cors.json
      "
    restart: "no"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      MINIO_ENDPOINT: minio:9000
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-localhost:9000}
      MINIO_PUBLIC_PATH_PREFIX: ${MINIO_PUBLIC_PATH_PREFIX:-}
      MINIO_SECURE: ${MINIO_SECURE:-false}
      APP_ENV: ${APP_ENV:-production}
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:8000:8000"
    command: >
      sh -c "
        python -m alembic upgrade head &&
        python -m scripts.seed &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

volumes:
  postgres_data:
  minio_data:
