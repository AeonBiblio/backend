# AeonBiblio — team16.st.ifbest.org
# Внешний шлюз (172.20.0.21) терминирует TLS и проксирует на :80 контейнера.
# Редирект HTTP→HTTPS на :80 вызывает ERR_TOO_MANY_REDIRECTS — отдаём контент напрямую.

map $http_x_forwarded_proto $aeon_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

server {
    listen 80;
    listen [::]:80;
    server_name team16.st.ifbest.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location /api/ {
        client_max_body_size 100m;
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $aeon_forwarded_proto;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /storage/ {
        add_header Access-Control-Allow-Origin "https://team16.st.ifbest.org" always;
        add_header Access-Control-Allow-Methods "GET, PUT, POST, DELETE, HEAD" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-amz-*" always;
        add_header Access-Control-Expose-Headers "ETag" always;
        client_max_body_size 0;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_pass http://127.0.0.1:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $aeon_forwarded_proto;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        client_max_body_size 50m;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $aeon_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name team16.st.ifbest.org;

    ssl_certificate     /etc/letsencrypt/live/team16.st.ifbest.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/team16.st.ifbest.org/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location /api/ {
        client_max_body_size 100m;
        proxy_pass http://127.0.0.1:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /storage/ {
        add_header Access-Control-Allow-Origin "https://team16.st.ifbest.org" always;
        add_header Access-Control-Allow-Methods "GET, PUT, POST, DELETE, HEAD" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-amz-*" always;
        add_header Access-Control-Expose-Headers "ETag" always;
        client_max_body_size 0;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_pass http://127.0.0.1:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        client_max_body_size 50m;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
